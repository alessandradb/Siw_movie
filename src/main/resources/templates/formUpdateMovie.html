
<!DOCTYPE html>
<html>
  <head>
    <title>Film</title>
	<link rel="stylesheet" href="/stile.css?version=2" />
</head>

<body>
	<div><a href="/"><img src="/logo-siw.png" width="50%"/></a></div>
    <div th:if="${movie}">
	    <h1 th:text="${movie.title}">Dettagli Film</h1>
        <div>Anno: <span th:text="'(' + ${movie.year} + ')'">2000</span></div>
        <a th:href="@{'/addDirectorToMovie' + '/' + ${movie.id}}">Aggiungi regista</a>
        <div><a th:href="@{'/updateActorsOnMovie' + '/' + ${movie.id}}">Modifica attori</a></div>
        <span><img width="30%" th:src=${movie.urlimage} /></span>
    </div>
    <div th:unless="${movie}">Non esiste</div>
  </body>
</html>
