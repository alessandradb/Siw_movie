
<!DOCTYPE html>
<html>
  <head>
    <title>Artista</title>
	<link rel="stylesheet" href="/stile.css?version=2" />
</head>

<body>
	<div><a href="/"><img src="/logo-siw.png" width="50%"/></a></div>
    <div th:if="${artist}">
	    <h1 th:text="${artist.name} + ' ' + ${artist.surname}">Dettagli artista</h1>
        <div>Anno di nascita: <span th:text="${artist.dateOfBirth}">2000</span></div>
        <div>Nazionalità: <span th:text="${artist.nationality}">2000</span></div>
    </div>
    <div th:unless="${artist}">Non esiste</div>
  </body>
</html>
